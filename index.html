<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MiniGig | Premium Celo Micro-Tasks</title>
    <meta name="description" content="MiniGig: The ultimate platform for micro-tasks on Celo. Boost your rewards with daily check-ins and streaks, optimized for MiniPay." />
    <meta name="author" content="earnwithalee" />
    <meta name="theme-color" content="#35D07F" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- MiniPay Optimization -->
    <meta name="minipay:min_version" content="1.0.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://minigig.celo">
    <meta property="og:title" content="MiniGig | Earn on Celo">
    <meta property="og:description" content="Complete tasks, maintain streaks, and earn rewards effortlessly with MiniPay.">
    <meta property="og:image" content="/og-image.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://minigig.celo">
    <meta property="twitter:title" content="MiniGig | Earn on Celo">
    <meta property="twitter:description" content="Complete tasks, maintain streaks, and earn rewards effortlessly with MiniPay.">
    <meta property="twitter:image" content="/og-image.png">

    <!-- TalentApp Verification (Proof of Ship) -->
    <meta name="talentapp:project_verification" content="83fe169d9c6b0749720810e49ad5019f0f7e1ecaed5b57378974bcf416884808664c0d38e63e9ee3e116d779c749e50fe35ff2b065342dca612935499ec77f60">

    <!-- MiniPay Injection Script -->
    <script src="https://pay.celo.org/inject.js"></script>
  </head>

    <div id="root"></div>

  </body>
</html>
