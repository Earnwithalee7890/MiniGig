name: Publish Packages

on:
  push:
    tags:
      - 'sdk-v*'
      - 'contracts-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Publish SDK
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: npm run sdk:build && npm publish -w @earnwithalee7890/minigig-sdk --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Contracts
        if: startsWith(github.ref, 'refs/tags/contracts-v')
        run: npm run contracts:build && npm publish -w @earnwithalee7890/minigig-contracts --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
